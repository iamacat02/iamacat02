<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes typing {
          from { width: 0 }
          to { width: 100% }
        }
        @keyframes blink {
          50% { border-color: transparent }
        }
        @keyframes gradient {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }

        .container {
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 180px;
          color: white;
          text-align: center;
        }

        h1 {
          font-size: 42px;
          margin: 0;
          background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #f5576c);
          background-size: 400% 400%;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          animation: gradient 15s ease infinite;
          width: fit-content;
          overflow: hidden;
          white-space: nowrap;
          border-right: 4px solid #f093fb;
          animation: typing 3.5s steps(30, end), blink .75s step-end infinite, gradient 15s ease infinite;
        }

        p {
          font-size: 20px;
          color: #8b949e;
          margin-top: 10px;
          opacity: 0;
          animation: fadeIn 1s ease forwards;
          animation-delay: 3.5s;
        }

        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }
      </style>
      <div class="container">
        <h1>👋 Hello, I'm Ar Asiful Islam!</h1>
        <p>🚀 Full-Stack Mobile &amp; Web Developer | 🎯 Building Cross-Platform Experiences</p>
      </div>
    </div>
  </foreignObject>
</svg>
